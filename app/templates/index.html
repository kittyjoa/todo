<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%232563EB'/><path d='M9 17l4 4 10-10' stroke='white' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <div class="layout">

      <!-- 왼쪽: 캘린더 -->
      <aside class="col-calendar">
        <div class="calendar-wrap">
          <div class="calendar-nav">
            <button id="cal-prev" class="cal-nav-btn" aria-label="이전 달">&#8249;</button>
            <span id="cal-month-label" class="cal-month-label"></span>
            <button id="cal-next" class="cal-nav-btn" aria-label="다음 달">&#8250;</button>
          </div>
          <div class="calendar-grid">
            <div class="cal-day-name">일</div>
            <div class="cal-day-name">월</div>
            <div class="cal-day-name">화</div>
            <div class="cal-day-name">수</div>
            <div class="cal-day-name">목</div>
            <div class="cal-day-name">금</div>
            <div class="cal-day-name">토</div>
            <div id="cal-days" class="cal-days"></div>
          </div>
        </div>
      </aside>

      <!-- 오른쪽: 할 일 -->
      <section class="col-todos">
        <div class="app-header">
          <h1 class="app-title">할 일</h1>
          <p id="selected-date-label" class="selected-date-label"></p>
        </div>

        <form id="todo-form" class="todo-form" novalidate>
          <input
            id="todo-input"
            class="todo-input"
            type="text"
            placeholder="할 일을 입력하세요"
            autocomplete="off"
            maxlength="200"
          >
          <button type="submit" class="todo-submit">추가</button>
        </form>

        <div id="todo-list-container" class="todo-list-container">
          <ul id="todo-list" class="todo-list"></ul>
          <p id="empty-state" class="empty-state">할 일을 적어보세요</p>
          <p id="error-state" class="error-state" hidden>목록을 불러오지 못했습니다</p>
        </div>
      </section>

    </div>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
